name: Build
on: [push, pull_request]
permissions:
  contents: write
env:
  DEPOT_DOWNLOADER_VERSION: "3.4.0"
  APP_ID: "294420"
  DEPOT_ID: "294422"
  MANIFEST_ID: "4777960841829662519"

jobs:
  build-mod:
    name: Build Mod
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) }}
    runs-on: windows-2025
    defaults:
      run:
        shell: cmd
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Fetch tags
      run: git fetch --tags --force

    - name: Setup build info
      env:
        COMMIT_SHA: ${{ github.sha }}
        BRANCH_NAME: ${{ github.ref_name }}
      run: |
          echo "Working directory: $PWD" | Out-Host
          echo "Branch name: $env:BRANCH_NAME" | Out-Host
          $branch = "nightly"
          if ($env:BRANCH_NAME -match '^(release|prerelease)/(.+)$') {
            $version = $Matches[2]
            $branch = $Matches[2]
            echo "Branch version (raw): $version" | Out-Host
          } else {
            $gitOutput = (git describe --tags --abbrev=0 2>&1)
            echo "git describe output: $gitOutput" | Out-Host
            $latestTag = ($gitOutput | Select-String -NotMatch "fatal").Line
            if ($latestTag) {
              $version = $latestTag -replace '^v', ''
              echo "Found tag: $latestTag -> $version" | Out-Host
            } else {
              $version = "0.0.0"
              echo "No tags found, defaulting to version 0.0.0" | Out-Host
            }
          }
          # Extract numeric version (e.g. "1.1-beta2" -> "1.1"), pad to 3 parts
          if ($version -match '^(\d+\.\d+(\.\d+)?)') {
            $numericVersion = $Matches[1]
            $parts = $numericVersion.Split('.')
            while ($parts.Count -lt 3) { $parts += '0' }
            $version = $parts -join '.'
            echo "BUILD_VERSION=$version" >> $env:GITHUB_ENV
            echo "Valid version: $version" | Out-Host
          } else {
            $version = "0.0.0"
            echo "BUILD_VERSION=$version" >> $env:GITHUB_ENV
            echo "Invalid version format, defaulting to 0.0.0" | Out-Host
          }
          $sha12 = $env:COMMIT_SHA.Substring(0,12)
          echo "COMMIT_SHA=$sha12" >> $env:GITHUB_ENV
          echo "Branch: $branch" | Out-Host
          echo "Commit SHA: $sha12" | Out-Host
          $buildInfoFile = "$env:GITHUB_WORKSPACE\WalkerSim\BuildInfo.cs"
          if (-Not (Test-Path $buildInfoFile)) {
            echo "Error: $buildInfoFile does not exist" | Out-Host
            exit 1
          }
          $content = Get-Content -Path $buildInfoFile -Raw
          $content = $content -replace '\[assembly: AssemblyMetadata\("Commit", "[^"]*"\)\]', "[assembly: AssemblyMetadata(`"Commit`", `"$sha12`")]"
          $content = $content -replace '\[assembly: AssemblyMetadata\("Branch", "[^"]*"\)\]', "[assembly: AssemblyMetadata(`"Branch`", `"$branch`")]"
          $content = $content -replace '\[assembly: AssemblyVersion\("[^"]*"\)\]', "[assembly: AssemblyVersion(`"$version`")]"
          $content = $content -replace '\[assembly: AssemblyFileVersion\("[^"]*"\)\]', "[assembly: AssemblyFileVersion(`"$version.0`")]"
          Set-Content -Path $buildInfoFile -Value $content
          echo "BuildInfo.cs updated" | Out-Host
          if ($branch -eq "nightly") {
            $readmeVersion = (git describe --tags --abbrev=0 2>&1) | Select-String -NotMatch "fatal" | ForEach-Object { $_.Line -replace '^v', '' }
            if (-not $readmeVersion) { $readmeVersion = "master" }
          } else {
            $readmeVersion = $branch
          }
          $readmeFile = "$env:GITHUB_WORKSPACE\Mod\Editor\README.txt"
          if (Test-Path $readmeFile) {
            $readmeContent = Get-Content -Path $readmeFile -Raw
            $readmeContent = $readmeContent -replace '\{version\}', $readmeVersion
            Set-Content -Path $readmeFile -Value $readmeContent
            echo "README.txt updated with version $readmeVersion" | Out-Host
          }
      shell: powershell

    - name: Cache DepotDownloader
      id: cache-depotdownloader
      uses: actions/cache@v5
      with:
        path: tools
        key: depotdownloader-${{ env.DEPOT_DOWNLOADER_VERSION }}

    - name: Fetch DepotDownloader
      if: steps.cache-depotdownloader.outputs.cache-hit != 'true'
      run: |
        curl.exe -LO https://github.com/SteamRE/DepotDownloader/releases/download/DepotDownloader_${{ env.DEPOT_DOWNLOADER_VERSION }}/DepotDownloader-windows-x64.zip
        mkdir tools
        tar -xf DepotDownloader-windows-x64.zip -C tools
        del DepotDownloader-windows-x64.zip

    - name: Generate hash of required_files.txt
      id: hash-files
      run: |
        $hash = (Get-FileHash -Path .\Binaries\required_files.txt -Algorithm SHA256).Hash
        echo "FILE_HASH=$hash" >> $env:GITHUB_ENV
      shell: powershell

    - name: Cache required binaries
      id: cache-binaries
      uses: actions/cache@v5
      with:
        path: Binaries
        key: binaries-${{ env.APP_ID }}-${{ env.DEPOT_ID }}-${{ env.MANIFEST_ID }}-${{ env.FILE_HASH }}

    - name: Fetch required binaries
      if: steps.cache-binaries.outputs.cache-hit != 'true'
      run: |
        mkdir temp
        .\tools\DepotDownloader.exe -app "${{ env.APP_ID }}" -depot "${{ env.DEPOT_ID }}" -manifest "${{ env.MANIFEST_ID }}" -filelist .\Binaries\required_files.txt -dir .\temp
        for /F "delims=" %%f in (.\Binaries\required_files.txt) do (
            set "file=%%f"
            setlocal enabledelayedexpansion
            set "file=!file:/=\!"
            move /Y ".\temp\!file!" ".\Binaries\"
            endlocal
        )
        rmdir /S /Q temp

    - name: Generate hash of NuGet dependencies
      id: hash-nuget
      run: |
        $files = Get-ChildItem -Path . -Recurse -Include *.csproj
        if ($files.Count -eq 0) {
          $combinedHash = "no-csproj-files"
        } else {
          $hashes = $files | ForEach-Object { (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash }
          $combinedString = $hashes -join ''
          $sha256 = [System.Security.Cryptography.SHA256]::Create()
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($combinedString)
          $hashBytes = $sha256.ComputeHash($bytes)
          $combinedHash = [System.BitConverter]::ToString($hashBytes).Replace('-', '').ToLower()
        }
        echo "NUGET_HASH=$combinedHash" >> $env:GITHUB_ENV
      shell: powershell

    - name: Cache NuGet packages
      id: cache-nuget
      uses: actions/cache@v5
      with:
        path: ~\.nuget\packages
        key: nuget-${{ runner.os }}-${{ env.NUGET_HASH }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2.0.0

    - name: Setup Nuget
      uses: Nuget/setup-nuget@v2.0.0

    - name: Restore nuget packages
      run: nuget restore WalkerSim2.sln

    - name: Build Mod and Tests
      run: |
        msbuild Mod\Mod.csproj -t:rebuild -property:Configuration=Release -property:Platform=x64
        msbuild Mod.Web\Mod.Web.csproj -t:rebuild -property:Configuration=Release -property:Platform=x64
        msbuild Tests\Tests.csproj -t:rebuild -property:Configuration=Release -property:Platform=x64

    - name: Run tests
      uses: josepho0918/vstest-action@e6f6fd4212c7e41d549732d346865cf0d0afbf33
      with:
        testAssembly: |
          /**/*test*.dll
          !./**/*TestAdapter.dll
          !./**/obj/**
        searchFolder: ./Tests/bin/x64/Release
        runInParallel: true

    - name: Prepare Mod artifact
      run: |
        mkdir artifact\WalkerSim2
        echo .pdb > exclude.txt
        xcopy /S /I /Y /F ".\Build\Release\Mod\*" ".\artifact\WalkerSim2\" /EXCLUDE:exclude.txt
        del exclude.txt

    - name: Stamp ModInfo.xml version
      shell: powershell
      run: |
        $modInfo = "artifact\WalkerSim2\ModInfo.xml"
        (Get-Content $modInfo -Raw) -replace 'Version value="[^"]*"', "Version value=`"$env:BUILD_VERSION`"" | Set-Content $modInfo

    - name: Upload Mod artifact
      uses: actions/upload-artifact@v7
      with:
        name: WalkerSim2-Mod-${{ env.BUILD_VERSION }}-${{ env.COMMIT_SHA }}
        path: ./artifact/**/*

  build-editor:
    name: Build Editor (${{ matrix.platform }})
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) }}
    strategy:
      matrix:
        include:
          - os: windows-2025
            rid: win-x64
            platform: Windows-x64
          - os: ubuntu-latest
            rid: linux-x64
            platform: Linux-x64
          - os: macos-14
            rid: osx-arm64
            platform: Mac-arm64
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Fetch tags
      run: git fetch --tags --force

    - name: Setup build info
      env:
        COMMIT_SHA: ${{ github.sha }}
        BRANCH_NAME: ${{ github.ref_name }}
      shell: pwsh
      run: |
          Write-Host "Branch name: $env:BRANCH_NAME"
          $branch = "nightly"
          if ($env:BRANCH_NAME -match '^(release|prerelease)/(.+)$') {
            $version = $Matches[2]
            $branch = $Matches[2]
          } else {
            $gitOutput = (git describe --tags --abbrev=0 2>&1)
            $latestTag = ($gitOutput | Select-String -NotMatch "fatal").Line
            if ($latestTag) {
              $version = $latestTag -replace '^v', ''
            } else {
              $version = "0.0.0"
            }
          }
          # Extract numeric version (e.g. "1.1-beta2" -> "1.1"), pad to 3 parts
          if ($version -match '^(\d+\.\d+(\.\d+)?)') {
            $numericVersion = $Matches[1]
            $parts = $numericVersion.Split('.')
            while ($parts.Count -lt 3) { $parts += '0' }
            $version = $parts -join '.'
            echo "BUILD_VERSION=$version" >> $env:GITHUB_ENV
          } else {
            $version = "0.0.0"
            echo "BUILD_VERSION=$version" >> $env:GITHUB_ENV
          }
          $sha12 = $env:COMMIT_SHA.Substring(0,12)
          echo "COMMIT_SHA=$sha12" >> $env:GITHUB_ENV
          $buildInfoFile = Join-Path $env:GITHUB_WORKSPACE "WalkerSim/BuildInfo.cs"
          $content = Get-Content -Path $buildInfoFile -Raw
          $content = $content -replace '\[assembly: AssemblyMetadata\("Commit", "[^"]*"\)\]', "[assembly: AssemblyMetadata(`"Commit`", `"$sha12`")]"
          $content = $content -replace '\[assembly: AssemblyMetadata\("Branch", "[^"]*"\)\]', "[assembly: AssemblyMetadata(`"Branch`", `"$branch`")]"
          $content = $content -replace '\[assembly: AssemblyVersion\("[^"]*"\)\]', "[assembly: AssemblyVersion(`"$version`")]"
          $content = $content -replace '\[assembly: AssemblyFileVersion\("[^"]*"\)\]', "[assembly: AssemblyFileVersion(`"$version.0`")]"
          Set-Content -Path $buildInfoFile -Value $content
          Write-Host "BuildInfo.cs updated to version $version, branch $branch ($sha12)"

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Publish Editor
      run: dotnet publish Editor/Editor.csproj -c Release -r ${{ matrix.rid }} -o Publish/Editor/${{ matrix.platform }} --self-contained true

    - name: Remove debug symbols from publish output
      shell: pwsh
      run: |
        Get-ChildItem -Path "Publish/Editor/${{ matrix.platform }}" -Include "*.pdb","*.dbg","*.dsym" -Recurse | Remove-Item -Force -Recurse

    - name: Setup Examples folder
      shell: pwsh
      run: |
        $outDir = "Publish/Editor/${{ matrix.platform }}"
        $examplesDir = "$outDir/Examples"
        New-Item -ItemType Directory -Path $examplesDir -Force | Out-Null
        Move-Item -Path "$outDir/WalkerSim.xml" -Destination "$examplesDir/Default.xml" -Force
        Copy-Item -Path "Editor/Examples/*.xml" -Destination $examplesDir

    - name: Create macOS .app bundle
      if: runner.os == 'macOS'
      shell: bash
      run: |
        APP="Publish/Editor/${{ matrix.platform }}/WalkerSim Editor.app"
        mkdir -p "$APP/Contents/MacOS"
        mkdir -p "$APP/Contents/Resources"
        # Generate .icns from the source icon PNG
        ICONSET="AppIcon.iconset"
        mkdir -p "$ICONSET"
        SRC="Editor/Assets/icon-512.png"
        sips -z 16 16     "$SRC" --out "$ICONSET/icon_16x16.png"
        sips -z 32 32     "$SRC" --out "$ICONSET/icon_16x16@2x.png"
        sips -z 32 32     "$SRC" --out "$ICONSET/icon_32x32.png"
        sips -z 64 64     "$SRC" --out "$ICONSET/icon_32x32@2x.png"
        sips -z 128 128   "$SRC" --out "$ICONSET/icon_128x128.png"
        sips -z 256 256   "$SRC" --out "$ICONSET/icon_128x128@2x.png"
        sips -z 256 256   "$SRC" --out "$ICONSET/icon_256x256.png"
        sips -z 512 512   "$SRC" --out "$ICONSET/icon_256x256@2x.png"
        cp "$SRC"                       "$ICONSET/icon_512x512.png"
        iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/AppIcon.icns"
        rm -rf "$ICONSET"
        # Move all published files into the bundle
        find "Publish/Editor/${{ matrix.platform }}" -maxdepth 1 -not -name '*.app' -not -path "Publish/Editor/${{ matrix.platform }}" -exec mv {} "$APP/Contents/MacOS/" \;
        # Copy Info.plist and substitute version
        sed "s/VERSION/${{ env.BUILD_VERSION }}/g" Editor/Assets/Info.plist > "$APP/Contents/Info.plist"
        # Make the main executable runnable
        chmod +x "$APP/Contents/MacOS/Editor"

    - name: Rename publish output
      shell: bash
      run: mv "Publish/Editor/${{ matrix.platform }}" "Publish/Editor/WalkerSim Editor"

    - name: Upload Editor artifact
      uses: actions/upload-artifact@v7
      with:
        name: WalkerSim2-Editor-${{ matrix.platform }}-${{ env.BUILD_VERSION }}-${{ env.COMMIT_SHA }}
        path: Publish/Editor/

  release:
    name: Release
    if: startsWith(github.ref, 'refs/heads/release/')
    needs: [build-mod, build-editor]
    runs-on: ubuntu-latest
    steps:
    - name: Determine version
      run: |
        VERSION="${GITHUB_REF_NAME#release/}"
        echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV

    - name: Checkout
      uses: actions/checkout@v6

    - name: Extract release notes from CHANGELOG.md
      run: |
        awk -v ver="$BUILD_VERSION" '
          /^# / {
            if (capturing) exit
            if ($0 == "# " ver) { capturing = 1; next }
          }
          capturing { print }
        ' CHANGELOG.md > release_notes.md
        if [ ! -s release_notes.md ]; then
          echo "::error::No CHANGELOG.md section found for version $BUILD_VERSION"
          exit 1
        fi
        echo "--- Release notes ---"
        cat release_notes.md

    - name: Download Mod artifact
      uses: actions/download-artifact@v4
      with:
        pattern: WalkerSim2-Mod-*
        path: release/Mod
        merge-multiple: true

    - name: Download Editor Windows artifact
      uses: actions/download-artifact@v4
      with:
        pattern: WalkerSim2-Editor-Windows-x64-*
        path: release/Editor-Windows-x64
        merge-multiple: true

    - name: Download Editor Linux artifact
      uses: actions/download-artifact@v4
      with:
        pattern: WalkerSim2-Editor-Linux-x64-*
        path: release/Editor-Linux-x64
        merge-multiple: true

    - name: Download Editor Mac artifact
      uses: actions/download-artifact@v4
      with:
        pattern: WalkerSim2-Editor-Mac-arm64-*
        path: release/Editor-Mac-arm64
        merge-multiple: true

    - name: Package release artifacts
      run: |
        cd release/Mod
        zip -r ../../WalkerSim2-${{ env.BUILD_VERSION }}.zip WalkerSim2/
        cd ../Editor-Windows-x64
        zip -r ../../WalkerSim2-Editor-Windows-x64-${{ env.BUILD_VERSION }}.zip "WalkerSim Editor"/
        cd ../Editor-Linux-x64
        zip -r ../../WalkerSim2-Editor-Linux-x64-${{ env.BUILD_VERSION }}.zip "WalkerSim Editor"/
        cd ../Editor-Mac-arm64
        zip -r ../../WalkerSim2-Editor-Mac-arm64-${{ env.BUILD_VERSION }}.zip "WalkerSim Editor"/

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ env.BUILD_VERSION }}
        tag_name: ${{ env.BUILD_VERSION }}
        make_latest: true
        generate_release_notes: false
        body_path: release_notes.md
        files: |
          WalkerSim2-${{ env.BUILD_VERSION }}.zip
          WalkerSim2-Editor-Windows-x64-${{ env.BUILD_VERSION }}.zip
          WalkerSim2-Editor-Linux-x64-${{ env.BUILD_VERSION }}.zip
          WalkerSim2-Editor-Mac-arm64-${{ env.BUILD_VERSION }}.zip

    - name: Upload Mod to Nexus Mods
      uses: Nexus-Mods/upload-action@v1.0.0-beta.5
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: 2574163
        filename: WalkerSim2-${{ env.BUILD_VERSION }}.zip
        version: ${{ env.BUILD_VERSION }}
        file_category: main
        archive_existing_file: true

    - name: Upload Editor (Windows) to Nexus Mods
      uses: Nexus-Mods/upload-action@v1.0.0-beta.5
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: 7211470
        filename: WalkerSim2-Editor-Windows-x64-${{ env.BUILD_VERSION }}.zip
        version: ${{ env.BUILD_VERSION }}
        file_category: optional
        archive_existing_file: true

    - name: Upload Editor (Linux) to Nexus Mods
      uses: Nexus-Mods/upload-action@v1.0.0-beta.5
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: 7211479
        filename: WalkerSim2-Editor-Linux-x64-${{ env.BUILD_VERSION }}.zip
        version: ${{ env.BUILD_VERSION }}
        file_category: optional
        archive_existing_file: true

    - name: Upload Editor (Mac) to Nexus Mods
      uses: Nexus-Mods/upload-action@v1.0.0-beta.5
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: 7211476
        filename: WalkerSim2-Editor-Mac-arm64-${{ env.BUILD_VERSION }}.zip
        version: ${{ env.BUILD_VERSION }}
        file_category: optional
        archive_existing_file: true

  post-release-merge:
    name: Merge Release into Master
    if: startsWith(github.ref, 'refs/heads/release/')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout master
      uses: actions/checkout@v6
      with:
        ref: master
        fetch-depth: 0

    - name: Determine versions
      run: |
        VERSION="${GITHUB_REF_NAME#release/}"
        NEXT_VERSION=$(echo "$VERSION" | awk -F. 'BEGIN{OFS="."} {$NF=$NF+1; print}')
        echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV
        echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV
        echo "Current: $VERSION, next: $NEXT_VERSION"

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Merge release branch into master
      run: git merge --ff "${{ github.sha }}" -m "Merge release/${BUILD_VERSION} into master"

    - name: Start next version in CHANGELOG.md
      run: |
        {
          echo "# $NEXT_VERSION (in progress)"
          echo
          cat CHANGELOG.md
        } > CHANGELOG.md.new
        mv CHANGELOG.md.new CHANGELOG.md
        git add CHANGELOG.md
        git commit -m "Start of $NEXT_VERSION"

    - name: Push master
      run: git push origin master

  prerelease:
    name: Pre-Release
    if: startsWith(github.ref, 'refs/heads/prerelease/')
    needs: [build-mod, build-editor]
    runs-on: ubuntu-latest
    steps:
    - name: Determine version
      run: |
        VERSION="${GITHUB_REF_NAME#prerelease/}"
        echo "BUILD_VERSION=${VERSION}" >> $GITHUB_ENV

    - name: Checkout
      uses: actions/checkout@v6

    - name: Extract release notes from CHANGELOG.md
      run: |
        awk -v ver="$BUILD_VERSION" '
          /^# / {
            if (capturing) exit
            if ($0 == "# " ver || $0 == "# " ver " (in progress)") { capturing = 1; next }
          }
          capturing { print }
        ' CHANGELOG.md > release_notes.md
        if [ ! -s release_notes.md ]; then
          echo "::error::No CHANGELOG.md section found for version $BUILD_VERSION"
          exit 1
        fi
        echo "--- Release notes ---"
        cat release_notes.md

    - name: Download Mod artifact
      uses: actions/download-artifact@v4
      with:
        pattern: WalkerSim2-Mod-*
        path: release/Mod
        merge-multiple: true

    - name: Download Editor Windows artifact
      uses: actions/download-artifact@v4
      with:
        pattern: WalkerSim2-Editor-Windows-x64-*
        path: release/Editor-Windows-x64
        merge-multiple: true

    - name: Download Editor Linux artifact
      uses: actions/download-artifact@v4
      with:
        pattern: WalkerSim2-Editor-Linux-x64-*
        path: release/Editor-Linux-x64
        merge-multiple: true

    - name: Download Editor Mac artifact
      uses: actions/download-artifact@v4
      with:
        pattern: WalkerSim2-Editor-Mac-arm64-*
        path: release/Editor-Mac-arm64
        merge-multiple: true

    - name: Package release artifacts
      run: |
        cd release/Mod
        zip -r ../../WalkerSim2-${{ env.BUILD_VERSION }}.zip WalkerSim2/
        cd ../Editor-Windows-x64
        zip -r ../../WalkerSim2-Editor-Windows-x64-${{ env.BUILD_VERSION }}.zip "WalkerSim Editor"/
        cd ../Editor-Linux-x64
        zip -r ../../WalkerSim2-Editor-Linux-x64-${{ env.BUILD_VERSION }}.zip "WalkerSim Editor"/
        cd ../Editor-Mac-arm64
        zip -r ../../WalkerSim2-Editor-Mac-arm64-${{ env.BUILD_VERSION }}.zip "WalkerSim Editor"/

    - name: Pre-Release
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ env.BUILD_VERSION }}
        tag_name: ${{ env.BUILD_VERSION }}
        prerelease: true
        make_latest: false
        generate_release_notes: false
        body_path: release_notes.md
        files: |
          WalkerSim2-${{ env.BUILD_VERSION }}.zip
          WalkerSim2-Editor-Windows-x64-${{ env.BUILD_VERSION }}.zip
          WalkerSim2-Editor-Linux-x64-${{ env.BUILD_VERSION }}.zip
          WalkerSim2-Editor-Mac-arm64-${{ env.BUILD_VERSION }}.zip
